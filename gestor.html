<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Protocolos — Editor Anatômico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem('tema_gestor');
            if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        :root {
            --bg:        #050507;
            --surface:   rgba(14, 14, 20, 0.95);
            --surface2:  rgba(22, 22, 32, 0.9);
            --text:      #f0f2f5;
            --muted:     #6b7280;
            --border:    rgba(255,255,255,0.07);
            --blue:      #00F0FF;
            --blue-dim:  rgba(0,240,255,0.08);
            --blue-glow: rgba(0,240,255,0.25);
            --gold:      #FFD700;
            --gold-dim:  rgba(255,215,0,0.08);
            --gold-glow: rgba(255,215,0,0.25);
            --danger:    #ff5555;
            --success:   #00fa9a;
            --success-dim: rgba(0,250,154,0.08);
            --mono:      'JetBrains Mono', monospace;
            --ui:        'Inter', sans-serif;
            --radius:    10px;
        }

        html[data-theme="light"] {
            --bg:        #f0f2f5;
            --surface:   rgba(255,255,255,0.92);
            --surface2:  rgba(240,242,248,0.95);
            --text:      #111827;
            --muted:     #6b7280;
            --border:    rgba(0,0,0,0.08);
            --blue:      #0077b6;
            --blue-dim:  rgba(0,119,182,0.07);
            --blue-glow: rgba(0,119,182,0.2);
            --gold:      #b45309;
            --gold-dim:  rgba(180,83,9,0.07);
            --gold-glow: rgba(180,83,9,0.2);
            --danger:    #dc2626;
            --success:   #059669;
            --success-dim: rgba(5,150,105,0.07);
        }

        html[data-theme="light"] body {
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(0,119,182,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 100%, rgba(180,83,9,0.04) 0%, transparent 55%);
        }

        html[data-theme="light"] .anatomy-panel,
        html[data-theme="light"] .protocol-card,
        html[data-theme="light"] .modal,
        html[data-theme="light"] .conn-field input,
        html[data-theme="light"] .field input,
        html[data-theme="light"] .field textarea {
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        html[data-theme="light"] .zona {
            fill: rgba(100,140,180,0.12);
            stroke: rgba(80,120,160,0.25);
        }
        html[data-theme="light"] .zona:hover {
            fill: rgba(0,119,182,0.15);
            stroke: var(--blue);
            filter: drop-shadow(0 0 6px rgba(0,119,182,0.25));
        }
        html[data-theme="light"] .zona.ativa {
            fill: rgba(0,119,182,0.18);
            stroke: var(--blue);
            filter: drop-shadow(0 0 10px rgba(0,119,182,0.3));
        }
        html[data-theme="light"] .zona.tem-dados {
            fill: rgba(180,83,9,0.1);
            stroke: rgba(180,83,9,0.35);
        }
        html[data-theme="light"] .zona.tem-dados:hover {
            fill: rgba(180,83,9,0.18);
            stroke: var(--gold);
            filter: drop-shadow(0 0 6px rgba(180,83,9,0.2));
        }
        html[data-theme="light"] .zona.tem-dados.ativa {
            fill: rgba(180,83,9,0.2);
            stroke: var(--gold);
            filter: drop-shadow(0 0 10px rgba(180,83,9,0.25));
        }
        html[data-theme="light"] .zona-label { fill: #9ca3af; }

        html[data-theme="light"] #log-auditoria { background: #f8fafc; }

        /* Botão de tema */
        .btn-tema-gestor {
            background: none; border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; padding: 7px 10px;
            color: var(--muted); transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
            font-family: var(--ui); font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-tema-gestor:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: var(--blue-dim); }
        html[data-theme="light"] .btn-tema-gestor:hover { background: var(--blue-dim); border-color: rgba(0,119,182,0.3); }
        .icon-moon-g, .icon-sun-g { display: block; }
        html[data-theme="light"] .icon-moon-g { display: none; }
        html[data-theme="dark"]  .icon-sun-g  { display: none; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(0,240,255,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 100%, rgba(255,215,0,0.03) 0%, transparent 55%);
            color: var(--text);
            font-family: var(--ui);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HEADER ── */
        .app-header {
            width: 100%; max-width: 1400px;
            padding: 20px 28px 0; display: flex;
            align-items: center; justify-content: space-between; gap: 16px;
        }
        .app-title { display: flex; align-items: center; gap: 12px; }
        .app-title h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
        .app-title span { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); opacity: 0.5; }
        .atom-spin { width: 28px; height: 28px; stroke: var(--blue); fill: none; animation: spin 20s linear infinite; flex-shrink: 0; filter: drop-shadow(0 0 4px var(--blue-glow)); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── CONEXÃO ── */
        .conn-bar { width: 100%; max-width: 1400px; padding: 16px 28px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .conn-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
        .conn-field.wide { flex: 2; min-width: 260px; }
        .conn-field label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .conn-field input { background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-family: var(--ui); font-size: 0.9rem; transition: border 0.2s; width: 100%; }
        .conn-field input:focus { outline: none; border-color: rgba(0,240,255,0.4); }
        .conn-field input[type="password"] { letter-spacing: 2px; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px; border-radius: var(--radius); font-family: var(--ui); font-weight: 600; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; border: 1px solid; white-space: nowrap; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-blue  { color: var(--blue); border-color: rgba(0,240,255,0.3); background: var(--blue-dim); }
        .btn-blue:hover:not(:disabled)  { background: var(--blue); color: #000; box-shadow: 0 0 16px var(--blue-glow); border-color: var(--blue); }
        .btn-gold  { color: var(--gold); border-color: rgba(255,215,0,0.3); background: var(--gold-dim); }
        .btn-gold:hover:not(:disabled)  { background: var(--gold); color: #000; box-shadow: 0 0 16px var(--gold-glow); border-color: var(--gold); }
        .btn-green { color: var(--success); border-color: rgba(0,250,154,0.3); background: var(--success-dim); }
        .btn-green:hover:not(:disabled) { background: var(--success); color: #000; box-shadow: 0 0 16px rgba(0,250,154,0.3); border-color: var(--success); }
        .btn-danger { color: var(--danger); border-color: rgba(255,85,85,0.3); background: rgba(255,85,85,0.05); }
        .btn-danger:hover:not(:disabled){ background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 0 16px rgba(255,85,85,0.2); }
        .btn-muted  { color: var(--muted); border-color: var(--border); background: transparent; }
        .btn-muted:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }

        .status-bar { width: 100%; max-width: 1400px; padding: 0 28px 8px; }
        #status-msg { font-size: 0.85rem; font-weight: 500; padding: 10px 16px; border-radius: var(--radius); display: none; }

        /* ── WORKSPACE (silhueta + painel) ── */
        .workspace { width: 100%; max-width: 1400px; padding: 0 28px 40px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }

        /* ── PAINEL ESQUERDO — SILHUETA ── */
        .anatomy-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; position: sticky; top: 20px; }
        .anatomy-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

        .body-svg-wrap { width: 100%; position: relative; }
        .body-svg-wrap svg { width: 100%; height: auto; display: block; }

        /* Zonas clicáveis */
        .zona { cursor: pointer; transition: all 0.2s; fill: rgba(100,140,180,0.18); stroke: rgba(100,160,200,0.3); stroke-width: 1.5; }
        .zona:hover { fill: rgba(0,240,255,0.18); stroke: var(--blue); stroke-width: 2; filter: drop-shadow(0 0 6px rgba(0,240,255,0.3)); }
        .zona.ativa { fill: rgba(0,240,255,0.22); stroke: var(--blue); stroke-width: 2.5; filter: drop-shadow(0 0 10px rgba(0,240,255,0.4)); }
        .zona.tem-dados { fill: rgba(255,215,0,0.12); stroke: rgba(255,215,0,0.4); }
        .zona.tem-dados:hover { fill: rgba(255,215,0,0.22); stroke: var(--gold); filter: drop-shadow(0 0 6px rgba(255,215,0,0.3)); }
        .zona.tem-dados.ativa { fill: rgba(255,215,0,0.25); stroke: var(--gold); filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); }
        .zona-label { font-size: 0.65rem; font-weight: 600; fill: var(--muted); pointer-events: none; text-transform: uppercase; letter-spacing: 0.5px; transition: fill 0.2s; }

        /* Botão Sistema Completo */
        .btn-sistemico { width: 100%; margin-top: 4px; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 12px; border-radius: var(--radius); background: transparent; border: 1px dashed var(--border); color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: var(--ui); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .btn-sistemico:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
        .btn-sistemico.tem-dados { border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }
        .btn-sistemico.tem-dados:hover { border-color: var(--gold); background: var(--gold-dim); box-shadow: 0 0 10px var(--gold-glow); }
        .btn-sistemico.ativa { background: var(--blue-dim); border: 1px solid var(--blue); color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }
        .btn-sistemico.tem-dados.ativa { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold); box-shadow: 0 0 16px var(--gold-glow); }

        .legenda { display: flex; gap: 16px; font-size: 0.7rem; color: var(--muted); margin-top: 8px; }
        .legenda-item { display: flex; align-items: center; gap: 6px; }
        .legenda-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid; }
        .legenda-dot.vazia { background: rgba(100,140,180,0.18); border-color: rgba(100,160,200,0.4); }
        .legenda-dot.com-dados { background: rgba(255,215,0,0.18); border-color: rgba(255,215,0,0.5); }
        .legenda-dot.selecionada { background: rgba(0,240,255,0.22); border-color: var(--blue); }

        /* ── PAINEL DIREITO — PROTOCOLOS ── */
        .protocols-panel { display: flex; flex-direction: column; gap: 16px; min-height: 500px; }
        .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .panel-region-name { display: flex; align-items: center; gap: 10px; }
        .region-badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 10px; border-radius: 20px; background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(0,240,255,0.25); }
        .region-count { font-size: 0.8rem; color: var(--muted); font-family: var(--mono); }

        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--muted); border: 1px dashed var(--border); border-radius: 16px; gap: 12px; min-height: 300px; }
        .empty-state svg { opacity: 0.25; }
        .empty-state p { font-size: 0.9rem; line-height: 1.5; max-width: 320px; }
        .empty-state .hint { font-size: 0.78rem; opacity: 0.6; }

        .cards-list { display: flex; flex-direction: column; gap: 10px; }
        .protocol-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; transition: all 0.2s; cursor: pointer; }
        .protocol-card:hover { border-color: rgba(255,255,255,0.14); background: var(--surface2); transform: translateX(3px); }
        .card-badge { flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; }
        .card-badge.indicado   { background: var(--gold); box-shadow: 0 0 6px var(--gold-glow); }
        .card-badge.n-indicado { background: var(--blue); box-shadow: 0 0 6px var(--blue-glow); }
        .card-info { flex: 1; min-width: 0; }
        .card-exame { font-family: var(--mono); font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .card-suspeita { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-decisao { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; display: inline-block; }
        .card-decisao.indicado   { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
        .card-decisao.n-indicado { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(0,240,255,0.2); }
        .card-actions { display: flex; gap: 6px; flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
        .protocol-card:hover .card-actions { opacity: 1; }

        /* ── MODAL / BOTTOM SHEET ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
        .modal-overlay.aberto { opacity: 1; pointer-events: all; }
        .modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; box-shadow: 0 24px 60px rgba(0,0,0,0.6); transform: translateY(20px) scale(0.97); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
        .modal-overlay.aberto .modal { transform: translateY(0) scale(1); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .modal-title { font-size: 0.95rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); }
        .modal-region { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
        .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 6px; transition: color 0.2s; }
        .modal-close:hover { color: var(--text); }

        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
        .field input, .field textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.88rem; transition: border 0.2s; }
        .field input:focus, .field textarea:focus { outline: none; border-color: rgba(0,240,255,0.4); background: rgba(0,240,255,0.02); }
        .field textarea { resize: vertical; min-height: 72px; font-family: var(--ui); font-size: 0.85rem; }

        .decisao-toggle { display: flex; gap: 10px; }
        .toggle-opt { flex: 1; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--ui); font-weight: 600; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .toggle-opt.sel-indicado { border-color: rgba(255,215,0,0.5); background: var(--gold-dim); color: var(--gold); box-shadow: 0 0 12px var(--gold-glow); }
        .toggle-opt.sel-nao { border-color: rgba(0,240,255,0.5); background: var(--blue-dim); color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }

        .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

        .action-bar { width: 100%; max-width: 1400px; padding: 0 28px 24px; display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }

        @media (max-width: 768px) {
            .app-header { padding: 16px 16px 0; } .conn-bar { padding: 12px 16px; } .status-bar { padding: 0 16px 8px; }
            .workspace { grid-template-columns: 1fr; padding: 0 16px 40px; gap: 16px; }
            .anatomy-panel { position: static; padding: 16px 12px; }
            .body-svg-wrap { max-width: 280px; margin: 0 auto; } .action-bar { padding: 0 16px 28px; }
            .modal-overlay { align-items: flex-end; padding: 0; }
            .modal { border-radius: 20px 20px 0 0; max-width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(100%); }
            .modal-overlay.aberto .modal { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div style="position: absolute; top: 12px; left: 16px; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); opacity: 0.6; z-index: 100; pointer-events: none;">v3.1.2</div>

<div class="app-header">
    <div class="app-title">
        <svg class="atom-spin" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="6" fill="#00F0FF"/>
            <ellipse cx="50" cy="50" rx="40" ry="12" stroke="#00F0FF" stroke-width="2" fill="none" transform="rotate(30 50 50)"/>
            <ellipse cx="50" cy="50" rx="40" ry="12" stroke="#00F0FF" stroke-width="2" fill="none" transform="rotate(90 50 50)"/>
            <ellipse cx="50" cy="50" rx="40" ry="12" stroke="#00F0FF" stroke-width="2" fill="none" transform="rotate(150 50 50)"/>
        </svg>
        <div>
            <h1>Editor de Protocolos</h1>
            <span>Motor de Protocolos — Gestor v3.1.2 (Lotes)</span>
        </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn-tema-gestor" onclick="alternarTema()" title="Alternar tema">
            <svg class="icon-moon-g" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            <svg class="icon-sun-g" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=Gestor+Protocolos" target="_blank"
           style="font-size:0.75rem;color:var(--blue);text-decoration:none;border-bottom:1px dashed rgba(0,240,255,0.4);white-space:nowrap;">
            Gerar Token GitHub
        </a>
    </div>
</div>

<div class="conn-bar">
    <div class="conn-field">
        <label>Usuário GitHub</label>
        <input type="text" id="gh-user" placeholder="Ex: jonas-oa" autocomplete="off" spellcheck="false">
    </div>
    <div class="conn-field">
        <label>Repositório</label>
        <input type="text" id="gh-repo" placeholder="Ex: motor-protocolos" autocomplete="off" spellcheck="false">
    </div>
    <div class="conn-field wide">
        <label>Token de Acesso (ghp_...)</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    </div>
    <button class="btn btn-blue" onclick="conectarGitHub()" id="btn-conectar">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Conectar
    </button>
</div>

<div class="status-bar">
    <div id="status-msg"></div>
</div>

<div class="workspace">

<script>
let arquivoSHA = "";
let conteudoOriginalArquivo = "";
const caminhoArquivo = "protocolos.js";
let banco = {};
let regiaoAtiva = null;
let modalIndiceEdicao = -1;

const ZONAS = {
    'zona-cranio':   'Crânio e SNC',
    'zona-pescoco':  'Face e Pescoço',
    'zona-torax':    'Tórax',
    'zona-abdome':   'Abdome',
    'zona-pelve':    'Pelve',
    'zona-coluna':   'Coluna',
    'zona-mmss':     'Membros Superiores',
    'zona-mmii':     'Membros Inferiores',
    'zona-sistemico':'Sistema Completo'
};

(function restaurarCredenciais() {
    document.getElementById('gh-user').value  = localStorage.getItem('gh_user')  || '';
    document.getElementById('gh-repo').value  = localStorage.getItem('gh_repo')  || '';
    document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
})();

function codificarBase64UTF8(texto) {
    const bytes = new TextEncoder().encode(texto);
    let binString = '';
    bytes.forEach(b => binString += String.fromCharCode(b));
    return btoa(binString);
}

function decodificarBase64UTF8(b64) {
    const binString = atob(b64);
    const bytes = new Uint8Array(binString.length);
    for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
}

function mostrarStatus(msg, tipo) {
    const el = document.getElementById('status-msg');
    el.style.display = 'block';
    el.innerText = msg;
    const estilos = {
        erro:    { bg: 'rgba(255,85,85,0.1)',   color: 'var(--danger)',  border: '1px solid rgba(255,85,85,0.3)' },
        sucesso: { bg: 'rgba(0,250,154,0.1)',   color: 'var(--success)', border: '1px solid rgba(0,250,154,0.3)' },
        info:    { bg: 'rgba(0,240,255,0.08)',  color: 'var(--blue)',    border: '1px solid rgba(0,240,255,0.25)' },
    };
    const s = estilos[tipo] || estilos.info;
    el.style.cssText += `background:${s.bg};color:${s.color};border:${s.border};border-radius:var(--radius);padding:10px 16px;font-size:0.85rem;font-weight:500;`;
}

function ocultarStatus() { document.getElementById('status-msg').style.display = 'none'; }

async function conectarGitHub() {
    const user  = document.getElementById('gh-user').value.trim();
    const repo  = document.getElementById('gh-repo').value.trim();
    const token = document.getElementById('gh-token').value.trim();

    if (!user || !repo || !token) { mostrarStatus("Preencha usuário, repositório e token antes de conectar.", "erro"); return; }
    localStorage.setItem('gh_user', user); localStorage.setItem('gh_repo', repo); localStorage.setItem('gh_token', token);

    const btn = document.getElementById('btn-conectar');
    btn.innerText = "Conectando..."; btn.disabled = true;

    banco = {};
    regiaoAtiva = null;
    document.getElementById('protocols-panel').innerHTML = `
        <div class="empty-state">
            <svg class="atom-spin" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:40px;height:40px;margin-bottom:12px;">
                <circle cx="50" cy="50" r="6" fill="#00F0FF"/>
                <ellipse cx="50" cy="50" rx="40" ry="12" stroke="#00F0FF" stroke-width="2" fill="none" transform="rotate(30 50 50)"/>
                <ellipse cx="50" cy="50" rx="40" ry="12" stroke="#00F0FF" stroke-width="2" fill="none" transform="rotate(90 50 50)"/>
                <ellipse cx="50" cy="50" rx="40" ry="12" stroke="#00F0FF" stroke-width="2" fill="none" transform="rotate(150 50 50)"/>
            </svg>
            <p>Sincronizando com a Nuvem...</p>
        </div>`;
    renderizarInterface();

    try {
        const url = `https://api.github.com/repos/${user}/${repo}/contents/${caminhoArquivo}`;
        const resp = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
        
        if (!resp.ok) {
            if (resp.status === 404) throw new Error("Arquivo protocolos.js não encontrado no repositório.");
            if (resp.status === 401) throw new Error("Token inválido ou sem permissão. Gere um novo usando o link acima.");
            throw new Error(`Erro HTTP ${resp.status}`);
        }

        const dados = await resp.json();
        arquivoSHA = dados.sha;
        
        conteudoOriginalArquivo = decodificarBase64UTF8(dados.content.replace(/\n/g, ''));

        extrairBanco(conteudoOriginalArquivo);
        renderizarInterface();
        mostrarStatus(`✅ Conectado! ${contarRegras()} regras carregadas de ${Object.keys(banco).length} regiões.`, "sucesso");
        document.getElementById('action-bar').style.display = 'flex';

    } catch (erro) { 
        mostrarStatus(erro.message, "erro"); 
        document.getElementById('protocols-panel').innerHTML = `<div class="empty-state"><p>Falha na conexão.</p></div>`;
    } 
    finally {
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Conectar`;
        btn.disabled = false;
    }
}

async function recarregarGitHub() { ocultarStatus(); await conectarGitHub(); }

function extrairBanco(codigoTexto) {
    banco = {};
    
    try {
        const inicioJSON = codigoTexto.indexOf('{');
        const fimJSON = codigoTexto.lastIndexOf('}');
        
        if (inicioJSON !== -1 && fimJSON !== -1) {
            let jsonStr = codigoTexto.substring(inicioJSON, fimJSON + 1);
            jsonStr = jsonStr.replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":').replace(/'([^']*)'/g, '"$1"');
            
            const obj = JSON.parse(jsonStr);

            for (const regiao in obj) {
                const regras = obj[regiao];
                if (!Array.isArray(regras)) continue;
                const filtradas = regras.map(r => normalizarRegra(r)).filter(r => r !== null);
                if (filtradas.length > 0) banco[regiao] = filtradas;
            }
        }
    } catch(e) {
        console.error("Erro no parser JSON seguro:", e);
        mostrarStatus("Falha de Integridade: O arquivo no GitHub não pôde ser interpretado como JSON seguro.", "erro");
    }

    Object.values(ZONAS).forEach(r => { if (!banco[r]) banco[r] = []; });
}

function normalizarRegra(r) {
    const exame    = (r.exame    || (Array.isArray(r.exames)    ? r.exames[0]    : '') || '').trim().toUpperCase();
    const suspeita = (r.suspeita || (Array.isArray(r.suspeitas) ? r.suspeitas[0] : '') || '').trim().toUpperCase();
    const decisao  = r.decisao  || 'CONTRASTE INDICADO';
    const comentarios = (r.comentarios || '').trim();

    if (!exame || !suspeita || exame.length < 3 || suspeita.length < 3) return null;
    const decisaoNorm = decisao.toUpperCase().includes('NÃO') || decisao.toUpperCase().includes('NAO') ? 'CONTRASTE NÃO INDICADO' : 'CONTRASTE INDICADO';

    return { exame, suspeita, decisao: decisaoNorm, comentarios };
}

function contarRegras() { return Object.values(banco).reduce((acc, arr) => acc + arr.length, 0); }

// NOVO: Função para processar e incorporar o Lote JSON gerado pela IA
function processarImportacao(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importado = JSON.parse(e.target.result);
            let adicionadas = 0;
            let duplicadas = 0;
            
            // Mapeamento inverso para validação segura de gavetas
            const zonasValidas = Object.values(ZONAS);

            for (const regiao in importado) {
                if (!zonasValidas.includes(regiao)) {
                    console.warn(`Região "${regiao}" ignorada no lote por não existir no sistema.`);
                    continue;
                }

                if (!banco[regiao]) banco[regiao] = [];

                const regrasImportadas = importado[regiao];
                if (!Array.isArray(regrasImportadas)) continue;

                regrasImportadas.forEach(r => {
                    const regraNorm = normalizarRegra(r);
                    if (!regraNorm) return;

                    // Trava contra duplicidade em lote
                    const jaExiste = banco[regiao].some(existente => 
                        existente.exame === regraNorm.exame && 
                        existente.suspeita === regraNorm.suspeita
                    );

                    if (!jaExiste) {
                        banco[regiao].push(regraNorm);
                        adicionadas++;
                    } else {
                        duplicadas++;
                    }
                });
            }

            renderizarInterface();
            
            if (adicionadas > 0) {
                mostrarStatus(`✅ Lote incorporado! ${adicionadas} regras inéditas adicionadas na memória. (${duplicadas} repetidas foram ignoradas). Clique em "Salvar no GitHub" para publicar.`, "sucesso");
            } else {
                mostrarStatus(`⚠️ Nenhuma regra nova. O lote continha apenas regras inválidas ou que já existiam (${duplicadas} duplicadas).`, "erro");
            }

        } catch (err) {
            console.error(err);
            mostrarStatus("Falha ao ler arquivo. O lote deve ser um formato JSON estritamente válido gerado pela IA.", "erro");
        }
        
        // Limpa o input para permitir importar o mesmo arquivo de novo se necessário
        event.target.value = '';
    };
    reader.readAsText(file);
}

function renderizarInterface() {
    Object.entries(ZONAS).forEach(([id, nome]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle('tem-dados', banco[nome] && banco[nome].length > 0);
        el.classList.toggle('ativa', nome === regiaoAtiva);
    });

    ['zona-mmss', 'zona-mmii'].forEach(id => {
        const orig = document.getElementById(id);
        const espelho = document.getElementById(id + '-dir');
        if (!orig || !espelho) return;
        
        espelho.classList.toggle('tem-dados', orig.classList.contains('tem-dados'));
        espelho.classList.toggle('ativa', orig.classList.contains('ativa'));
    });

    renderizarPainelProtocolos();
}

function renderizarPainelProtocolos() {
    const painel = document.getElementById('protocols-panel');
    if (!regiaoAtiva) {
        painel.innerHTML = `<div class="empty-state" id="estado-inicial"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><p>Clique em uma região anatômica na silhueta para ver e editar os protocolos.</p></div>`;
        return;
    }

    const regras = banco[regiaoAtiva] || [];
    let html = `
    <div class="panel-header">
        <div class="panel-region-name"><span class="region-badge">${regiaoAtiva}</span><span class="region-count">${regras.length} ${regras.length === 1 ? 'regra' : 'regras'}</span></div>
        <button class="btn btn-green btn-sm" onclick="abrirModalNovo()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova Regra</button>
    </div>`;

    if (regras.length === 0) {
        html += `<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg><p>Nenhum protocolo cadastrado para <strong>${regiaoAtiva}</strong>.</p><span class="hint">Clique em "Nova Regra" para adicionar o primeiro.</span></div>`;
    } else {
        html += `<div class="cards-list">`;
        regras.forEach((r, i) => {
            const isInd = r.decisao === 'CONTRASTE INDICADO';
            html += `<div class="protocol-card" onclick="abrirModalEdicao(${i})"><div class="card-badge ${isInd ? 'indicado' : 'n-indicado'}"></div><div class="card-info"><div class="card-exame">${r.exame}</div><div class="card-suspeita">${r.suspeita}</div><span class="card-decisao ${isInd ? 'indicado' : 'n-indicado'}">${isInd ? 'Contraste Indicado' : 'Não Indicado'}</span>${r.comentarios ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:6px;font-style:italic;">${r.comentarios}</div>` : ''}</div><div class="card-actions"><button class="btn btn-muted btn-sm" onclick="event.stopPropagation();abrirModalEdicao(${i})">Editar</button></div></div>`;
        });
        html += `</div>`;
    }
    painel.innerHTML = html;
}

function selecionarRegiao(nome) {
    regiaoAtiva = nome; renderizarInterface();
    if (window.innerWidth <= 768) document.getElementById('protocols-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

let decisaoAtual = 'CONTRASTE INDICADO';

function abrirModalNovo() {
    modalIndiceEdicao = -1;
    document.getElementById('modal-titulo').innerText = 'Nova Regra';
    document.getElementById('modal-regiao').innerText = regiaoAtiva || '';
    document.getElementById('modal-exame').value = '';
    document.getElementById('modal-suspeita').value = '';
    document.getElementById('modal-comentarios').value = '';
    document.getElementById('btn-excluir-modal').style.display = 'none';
    setDecisao('CONTRASTE INDICADO'); abrirModal();
}

function abrirModalEdicao(i) {
    const r = banco[regiaoAtiva][i];
    modalIndiceEdicao = i;
    document.getElementById('modal-titulo').innerText = 'Editar Regra';
    document.getElementById('modal-regiao').innerText = regiaoAtiva;
    document.getElementById('modal-exame').value = r.exame;
    document.getElementById('modal-suspeita').value = r.suspeita;
    document.getElementById('modal-comentarios').value = r.comentarios || '';
    document.getElementById('btn-excluir-modal').style.display = 'inline-flex';
    setDecisao(r.decisao); abrirModal();
}

function abrirModal() { document.getElementById('modal-overlay').classList.add('aberto'); setTimeout(() => document.getElementById('modal-exame').focus(), 200); }
function fecharModal(event) { if (event.target === document.getElementById('modal-overlay')) fecharModalDireto(); }
function fecharModalDireto() { document.getElementById('modal-overlay').classList.remove('aberto'); }

function setDecisao(valor) {
    decisaoAtual = valor;
    document.getElementById('opt-indicado').className = 'toggle-opt' + (valor === 'CONTRASTE INDICADO' ? ' sel-indicado' : '');
    document.getElementById('opt-nao').className = 'toggle-opt' + (valor === 'CONTRASTE NÃO INDICADO' ? ' sel-nao' : '');
}

function salvarModal() {
    const exame = document.getElementById('modal-exame').value.trim().toUpperCase();
    const suspeita = document.getElementById('modal-suspeita').value.trim().toUpperCase();
    const comentarios = document.getElementById('modal-comentarios').value.trim();

    if (!exame || !suspeita) {
        document.getElementById('modal-exame').style.borderColor = !exame ? 'var(--danger)' : '';
        document.getElementById('modal-suspeita').style.borderColor = !suspeita ? 'var(--danger)' : '';
        return;
    }
    document.getElementById('modal-exame').style.borderColor = ''; document.getElementById('modal-suspeita').style.borderColor = '';

    if (!banco[regiaoAtiva]) banco[regiaoAtiva] = [];

    const regraDuplicada = banco[regiaoAtiva].some((r, idx) => idx !== modalIndiceEdicao && r.exame === exame && r.suspeita === suspeita);
    if (regraDuplicada) {
        mostrarStatus("Bloqueio de Integridade: Esta combinação de Exame e Suspeita já existe nesta região.", "erro");
        return;
    }

    const regra = { exame, suspeita, decisao: decisaoAtual, comentarios };

    if (modalIndiceEdicao === -1) banco[regiaoAtiva].push(regra);
    else banco[regiaoAtiva][modalIndiceEdicao] = regra;

    fecharModalDireto(); renderizarInterface();
    mostrarStatus(`Regra salva localmente. Clique em "Salvar no GitHub" para publicar.`, "info");
}

function excluirRegraModal() {
    if (!confirm(`Excluir esta regra de "${regiaoAtiva}"?`)) return;
    banco[regiaoAtiva].splice(modalIndiceEdicao, 1);
    fecharModalDireto(); renderizarInterface();
    mostrarStatus('Regra excluída. Clique em "Salvar no GitHub" para publicar.', "info");
}

async function comitarTudo() {
    if (!conteudoOriginalArquivo) { mostrarStatus("Conecte ao GitHub primeiro antes de salvar.", "erro"); return; }
    const totalRegras = contarRegras();
    if (!confirm(`Publicar ${totalRegras} regras no aplicativo em produção. Confirma?`)) return;

    const bancoFiltrado = {};
    Object.entries(banco).forEach(([regiao, regras]) => {
        const validas = regras.filter(r => r.exame && r.suspeita);
        if (validas.length > 0) bancoFiltrado[regiao] = validas;
    });

    const jsonFormatado = JSON.stringify(bancoFiltrado, null, 4);
    const codigoNovo = `const bancoDeDados = ${jsonFormatado};\n`;

    const user  = document.getElementById('gh-user').value.trim();
    const repo  = document.getElementById('gh-repo').value.trim();
    const token = document.getElementById('gh-token').value.trim();

    const btn = document.getElementById('btn-salvar'); btn.innerText = "Publicando..."; btn.disabled = true;

    try {
        const base64Novo = codificarBase64UTF8(codigoNovo);
        const url = `https://api.github.com/repos/${user}/${repo}/contents/${caminhoArquivo}`;
        const resp = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: `Gestor: atualização de protocolos seguros (${totalRegras} regras)`, content: base64Novo, sha: arquivoSHA })
        });

        if (!resp.ok) throw new Error(`Falha no commit: HTTP ${resp.status}. Verifique permissões do token.`);

        const dados = await resp.json();
        arquivoSHA = dados.content.sha;
        conteudoOriginalArquivo = codigoNovo;
        mostrarStatus(`✅ ${totalRegras} regras publicadas com sucesso! Motor atualizado.`, "sucesso");

    } catch (erro) { mostrarStatus(erro.message, "erro"); } 
    finally {
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salvar no GitHub`;
        btn.disabled = false;
    }
}

Object.values(ZONAS).forEach(r => { if (!banco[r]) banco[r] = []; });

function alternarTema() {
    const atual = document.documentElement.getAttribute('data-theme') || 'dark';
    const novo = atual === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', novo);
    localStorage.setItem('tema_gestor', novo);
}
</script>
